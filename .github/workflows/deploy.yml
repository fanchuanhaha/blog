name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      d1_id: ${{ steps.ensure-d1.outputs.d1_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure D1 database exists
        id: ensure-d1
        run: |
          # 1. 尝试创建（已存在会报错，忽略）
          npx wrangler d1 create aiovtue-blog 2>/dev/null || true
          # 2. 从列表获取数据库 ID
          DB_ID=$(npx wrangler d1 list --json 2>/dev/null | node -e "
            let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
              const arr=JSON.parse(d);
              const db=arr.find(x=>x.name==='aiovtue-blog');
              if(db) process.stdout.write(db.uuid||db.database_id||'');
            })")
          echo "D1 database IDs: $DB_ID"
          echo "d1_id=$DB_ID" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply aiovtue-blog --remote --database-id ${{ steps.ensure-d1.outputs.d1_id }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync content to D1
        run: |
          # 临时注入 database_id 供迁移脚本使用
          sed -i "s/database_id = \".*\"/database_id = \"${{ steps.ensure-d1.outputs.d1_id }}\"/" wrangler.toml
          pnpm migrate:posts
          pnpm migrate:links
          pnpm migrate:about
          pnpm migrate:gallery
          pnpm migrate:notice
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build SPA
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name aiovtue-blog --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
