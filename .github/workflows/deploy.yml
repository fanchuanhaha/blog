name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure D1 database exists
        run: |
          # 尝试创建 D1 数据库（已存在则跳过）
          OUTPUT=$(npx wrangler d1 create aiovtue-blog 2>&1) || true
          echo "$OUTPUT"
          # 从创建成功的输出中提取 database_id
          DB_ID=$(echo "$OUTPUT" | grep -oP 'database_id\s*=\s*"\K[^"]+')
          # 如果为空，说明数据库已存在，从列表中取
          if [ -z "$DB_ID" ]; then
            DB_ID=$(npx wrangler d1 list --json 2>/dev/null | node -e "
              let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
                const arr=JSON.parse(d);
                const db=arr.find(x=>x.name==='aiovtue-blog');
                if(db) process.stdout.write(db.uuid||db.database_id||'');
              })")
          fi
          echo "database_id=$DB_ID"
          # 注入到 wrangler.toml
          sed -i "s/database_id = \".*\"/database_id = \"$DB_ID\"/" wrangler.toml
          cat wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations (remote)
        run: pnpm d1:migrate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync content to D1
        run: |
          pnpm migrate:posts
          pnpm migrate:links
          pnpm migrate:about
          pnpm migrate:gallery
          pnpm migrate:notice
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build SPA
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name aiovtue-blog --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
